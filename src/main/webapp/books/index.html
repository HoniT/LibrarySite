<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Library Book Manager</h1>

<div class="card" id="addFormCard">
    <h2>Add New Book</h2>
    <form id="addBookForm">
        <div class="form-group">
            <input type="text" id="addTitle" placeholder="Book Title" required>
            <input type="text" id="addAuthor" placeholder="Author Name" required>
            <button type="submit">Add Book</button>
        </div>
    </form>
</div>

<div class="card hidden" id="editFormCard">
    <h2>Edit Book</h2>
    <form id="editBookForm">
        <input type="hidden" id="editCode">
        <div class="form-group">
            <input type="text" id="editTitle" placeholder="New Title">
            <input type="text" id="editAuthor" placeholder="New Author">
            <button type="submit">Save Changes</button>
            <button type="button" class="danger" onclick="cancelEdit()">Cancel</button>
        </div>
    </form>
</div>

<table>
    <thead>
    <tr>
        <th>Code</th>
        <th>Title</th>
        <th>Author</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="bookTableBody">
    </tbody>
</table>

<script src="app.js"></script>
</body>
</html>
